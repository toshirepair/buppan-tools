<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>クイックドゥ相場リサーチツール</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 16px;
      line-height: 1.6;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
    }
    .card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 16px;
      margin-top: 12px;
    }
    label {
      display: inline-block;
      margin-right: 12px;
      margin-bottom: 4px;
    }
    input[type="text"],
    textarea {
      width: 100%;
      padding: 8px;
      font-size: 1rem;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    textarea {
      resize: vertical;
    }
    button {
      padding: 10px 18px;
      font-size: 1rem;
      cursor: pointer;
      border-radius: 6px;
      border: none;
      background: #2563eb;
      color: #fff;
      margin-top: 12px;
    }
    .btn-gray {
      background: #6b7280;
      color: #fff;
    }
    .small {
      font-size: 0.85rem;
      color: #555;
    }
    ul.result-list {
      list-style: none;
      padding-left: 0;
      margin: 0;
      margin-top: 8px;
    }
    ul.result-list li {
      margin-bottom: 14px;
    }
    a.result-link {
      font-size: 1rem;
      text-decoration: underline;
      color: #2563eb;
      word-break: break-word;
    }
    textarea.copy-area {
      width: 100%;
      min-height: 240px;
      box-sizing: border-box;
      font-size: 0.85rem;
      margin-top: 8px;
      white-space: pre-wrap;
    }
    .memo-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 12px;
    }
    .memo-box label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .memo-box-full {
      grid-column: 1 / -1;
    }
    .option-row {
      margin-top: 12px;
    }
    .inline-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 6px;
    }
    .profit-box {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      margin-top: 12px;
      background: #fafafa;
    }
    .profit-box strong {
      display: inline-block;
      min-width: 120px;
    }
    .profit-line {
      margin-bottom: 6px;
    }
    @media (min-width: 700px) {
      .memo-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>

<body>
  <h1>クイックドゥ相場リサーチツール</h1>

  <div class="card">
    <div>
      <label for="keyword"><strong>型番（ベースキーワード）</strong></label>
      <input type="text" id="keyword" placeholder="例：Nikon D750">
    </div>

    <div class="option-row">
      <div><strong>並び順（落札相場）</strong></div>
      <div class="inline-group">
        <label><input type="radio" name="sortOrder" value="low" checked> 落札価格の安い順</label>
        <label><input type="radio" name="sortOrder" value="high"> 落札価格の高い順</label>
      </div>
    </div>

    <div class="option-row">
      <div><strong>状態</strong></div>
      <div class="inline-group">
        <label><input type="radio" name="condition" value="" checked> 指定なし</label>
        <label><input type="radio" name="condition" value="動作確認済み"> 動作確認済み</label>
        <label><input type="radio" name="condition" value="未確認"> 未確認</label>
        <label><input type="radio" name="condition" value="訳あり"> 訳あり</label>
        <label><input type="radio" name="condition" value="現状"> 現状</label>
        <label><input type="radio" name="condition" value="ジャンク"> ジャンク</label>
      </div>
      <div class="small" style="margin-top:6px;">
        ※ 「指定なし」の場合は追加キーワードなしで、型番のみで検索します。<br>
        ※ 状態追加キーワードは「過去の落札相場リンク」のみに反映されます。
      </div>
    </div>

    <button id="runBtn">検索開始</button>
  </div>

  <div id="result" class="card" style="display:none; margin-top:16px;">
    <strong>リンク一覧（スマホ／PC共通）</strong>
    <div id="resultLinks" class="small" style="margin-top:8px;"></div>
  </div>

  <script>
    const CHATWORK_URL = "https://www.chatwork.com/#!rid417619944";

    document.getElementById("runBtn").addEventListener("click", function () {
      const baseWord = document.getElementById("keyword").value.trim();

      if (!baseWord) {
        alert("型番を入力してください。");
        document.getElementById("keyword").focus();
        return;
      }

      const selectedSort = document.querySelector('input[name="sortOrder"]:checked')?.value || "low";
      const selectedCondition = document.querySelector('input[name="condition"]:checked')?.value || "";

      const keywordForClosed = buildKeyword(baseWord, selectedCondition);
      const keywordForActive = baseWord;

      const closedSortSelect = selectedSort === "low" ? "1" : "2";
      const sortLabel = selectedSort === "low" ? "落札価格の安い順" : "落札価格の高い順";

      const links = [
        {
          label: `ヤフオク落札相場（ストア／大阪）【${sortLabel}】`,
          url: buildClosedStoreOsakaUrl(keywordForClosed, closedSortSelect)
        },
        {
          label: `ヤフオク落札相場（個人／全国）【${sortLabel}】`,
          url: buildClosedPrivateUrl(keywordForClosed, closedSortSelect)
        },
        {
          label: "ヤフオク開催中（全て）【入札件数の多い順】",
          url: buildActiveBidCountDescUrl(keywordForActive)
        },
        {
          label: "ヤフオク開催中（全て）【現在価格の安い順（送料込み）】",
          url: buildActivePriceAscUrl(keywordForActive)
        }
      ];

      renderLinks({
        keyword: keywordForClosed,
        condition: selectedCondition || "指定なし",
        sortLabel,
        links
      });
    });

    function buildKeyword(baseWord, condition) {
      const parts = [baseWord.trim()];
      if (condition && condition.trim()) {
        parts.push(condition.trim());
      }
      return parts.join(" ");
    }

    function buildClosedStoreOsakaUrl(keyword, selectValue) {
      const p = encodeURIComponent(keyword);
      return (
        "https://auctions.yahoo.co.jp/closedsearch/closedsearch" +
        "?p=" + p +
        "&fixed=0" +
        "&loc_cd=27" +
        "&b=1" +
        "&is_postage_mode=1" +
        "&n=50" +
        "&select=" + encodeURIComponent(selectValue) +
        "&mode=2" +
        "&dest_pref_code=11" +
        "&abatch=1"
      );
    }

    function buildClosedPrivateUrl(keyword, selectValue) {
      const p = encodeURIComponent(keyword);
      return (
        "https://auctions.yahoo.co.jp/closedsearch/closedsearch" +
        "?p=" + p +
        "&fixed=0" +
        "&b=1" +
        "&is_postage_mode=1" +
        "&n=50" +
        "&select=" + encodeURIComponent(selectValue) +
        "&mode=2" +
        "&dest_pref_code=11" +
        "&abatch=2"
      );
    }

    // 参考URLどおり：入札件数の多い順
    function buildActiveBidCountDescUrl(keyword) {
      const p = encodeURIComponent(keyword);
      return (
        "https://auctions.yahoo.co.jp/search/search" +
        "?p=" + p +
        "&va=" + p +
        "&is_postage_mode=1" +
        "&dest_pref_code=11" +
        "&b=1" +
        "&n=50" +
        "&s1=bids" +
        "&o1=a" +
        "&mode=2"
      );
    }

    function buildActivePriceAscUrl(keyword) {
      const p = encodeURIComponent(keyword);
      return (
        "https://auctions.yahoo.co.jp/search/search" +
        "?p=" + p +
        "&va=" + p +
        "&b=1" +
        "&n=50" +
        "&isdr=0" +
        "&exflg=1" +
        "&s1=cbids" +
        "&o1=a"
      );
    }

    function parseMoney(value) {
      if (!value) return NaN;
      const normalized = String(value)
        .replace(/[￥¥円,\s]/g, "")
        .replace(/[^\d.]/g, "");
      return normalized ? Number(normalized) : NaN;
    }

    function formatYen(value) {
      if (!Number.isFinite(value)) return "";
      return "¥" + Math.round(value).toLocaleString("ja-JP");
    }

    function calcQuickdoFee(price) {
      if (!Number.isFinite(price) || price < 0) return { fee: NaN, rule: "" };

      let fee = 0;
      let rule = "";

      if (price <= 4999) {
        fee = 1300 + price * 0.07;
        rule = "7%：1円～4,999円";
      } else if (price <= 9999) {
        fee = price * 0.35;
        rule = "35%：5,000円～9,999円";
      } else if (price <= 19999) {
        fee = price * 0.25;
        rule = "25%：10,000円～19,999円";
      } else if (price <= 49999) {
        fee = price * 0.18;
        rule = "18%：20,000円～49,999円";
      } else if (price <= 99999) {
        fee = price * 0.12;
        rule = "12%：50,000円～99,999円";
      } else if (price <= 199999) {
        fee = price * 0.10;
        rule = "10%：100,000円～199,999円";
      } else if (price <= 499999) {
        fee = price * 0.09;
        rule = "9%：200,000円～499,999円";
      } else {
        fee = price * 0.08;
        rule = "8%：500,000円～";
      }

      return { fee, rule };
    }

    function renderLinks(data) {
      const resultDiv = document.getElementById("result");
      const resultLinks = document.getElementById("resultLinks");

      if (!data.links || data.links.length === 0) {
        resultDiv.style.display = "none";
        resultLinks.innerHTML = "";
        return;
      }

      let html = '<ul class="result-list">';
      data.links.forEach(link => {
        html += `
          <li>
            <a class="result-link" href="${escapeHtml(link.url)}" target="_blank" rel="noopener noreferrer">
              <strong>${escapeHtml(link.label)}</strong>
            </a>
          </li>
        `;
      });
      html += "</ul>";

      html += `
        <div class="memo-grid">
          <div class="memo-box">
            <label for="memoQuickdo">クイックドゥの相場（売価）</label>
            <input type="text" id="memoQuickdo" placeholder="例：65,000">
          </div>
          <div class="memo-box">
            <label for="memoPrivate">個人の相場（仕入れ値）</label>
            <input type="text" id="memoPrivate" placeholder="例：45,000">
          </div>
          <div class="memo-box memo-box-full">
            <label for="memoFree">自由メモ</label>
            <textarea id="memoFree" rows="4" placeholder="必要があればメモを入力"></textarea>
          </div>
        </div>

        <div id="profitResult" class="profit-box" style="display:none;">
          <div class="profit-line"><strong>売価</strong><span id="profitSell"></span></div>
          <div class="profit-line"><strong>仕入れ値</strong><span id="profitBuy"></span></div>
          <div class="profit-line"><strong>手数料</strong><span id="profitFee"></span></div>
          <div class="profit-line"><strong>利益</strong><span id="profitValue"></span></div>
        </div>

        <div style="margin-top:12px;">
          <button type="button" id="copyBtn">この結果をコピー</button>
          <button type="button" id="openChatworkBtn" class="btn-gray" style="margin-left:8px;">
            チャットワークを開く
          </button>
        </div>
        <textarea class="copy-area" id="copyArea" readonly></textarea>
      `;

      resultLinks.innerHTML = html;
      resultDiv.style.display = "block";

      const copyBtn = document.getElementById("copyBtn");
      const copyArea = document.getElementById("copyArea");
      const openChatworkBtn = document.getElementById("openChatworkBtn");

      const memoQuickdo = document.getElementById("memoQuickdo");
      const memoPrivate = document.getElementById("memoPrivate");
      const memoFree = document.getElementById("memoFree");

      const profitResult = document.getElementById("profitResult");
      const profitSell = document.getElementById("profitSell");
      const profitBuy = document.getElementById("profitBuy");
      const profitFee = document.getElementById("profitFee");
      const profitValue = document.getElementById("profitValue");

      function getProfitData() {
        const quickdoPrice = parseMoney(memoQuickdo.value);
        const privatePrice = parseMoney(memoPrivate.value);

        if (!Number.isFinite(quickdoPrice) || !Number.isFinite(privatePrice)) {
          return null;
        }

        const feeInfo = calcQuickdoFee(quickdoPrice);
        const profit = quickdoPrice - privatePrice - feeInfo.fee;

        return {
          quickdoPrice,
          privatePrice,
          fee: feeInfo.fee,
          rule: feeInfo.rule,
          profit
        };
      }

      function refreshProfitBox() {
        const dataProfit = getProfitData();

        if (!dataProfit) {
          profitResult.style.display = "none";
          profitSell.textContent = "";
          profitBuy.textContent = "";
          profitFee.textContent = "";
          profitValue.textContent = "";
          profitValue.style.color = "#000";
          profitValue.style.fontWeight = "400";
          return;
        }

        profitSell.textContent = formatYen(dataProfit.quickdoPrice);
        profitBuy.textContent = formatYen(dataProfit.privatePrice);
        profitFee.textContent = `${formatYen(dataProfit.fee)}（${dataProfit.rule}）`;
        profitValue.textContent = formatYen(dataProfit.profit);

        if (dataProfit.profit < 0) {
          profitValue.style.color = "#dc2626";
          profitValue.style.fontWeight = "700";
        } else {
          profitValue.style.color = "#000";
          profitValue.style.fontWeight = "700";
        }

        profitResult.style.display = "block";
      }

      function buildCopyText() {
        let copyText = "";
        copyText += `■検索キーワード：${data.keyword}\n`;
        copyText += `■状態：${data.condition}\n`;
        copyText += `■落札相場の並び順：${data.sortLabel}\n\n`;

        if (memoQuickdo.value.trim()) {
          copyText += `■クイックドゥの相場（売価）：${memoQuickdo.value.trim()}\n`;
        }
        if (memoPrivate.value.trim()) {
          copyText += `■個人の相場（仕入れ値）：${memoPrivate.value.trim()}\n`;
        }

        const profitData = getProfitData();
        if (profitData) {
          copyText += `■手数料：${formatYen(profitData.fee)}（${profitData.rule}）\n`;
          copyText += `■利益：${formatYen(profitData.profit)}\n`;
        }

        if (memoFree.value.trim()) {
          copyText += `■自由メモ：${memoFree.value.trim()}\n`;
        }

        if (
          memoQuickdo.value.trim() ||
          memoPrivate.value.trim() ||
          memoFree.value.trim() ||
          profitData
        ) {
          copyText += `\n`;
        }

        data.links.forEach(link => {
          copyText += `${link.label}\n${link.url}\n\n`;
        });

        return copyText;
      }

      function refreshAll() {
        refreshProfitBox();
        copyArea.value = buildCopyText();
      }

      memoQuickdo.addEventListener("input", refreshAll);
      memoPrivate.addEventListener("input", refreshAll);
      memoFree.addEventListener("input", refreshAll);

      refreshAll();

      if (copyBtn && copyArea) {
        copyBtn.addEventListener("click", async function () {
          const text = copyArea.value;

          try {
            if (navigator.clipboard && navigator.clipboard.writeText) {
              await navigator.clipboard.writeText(text);
            } else {
              copyArea.focus();
              copyArea.select();
              document.execCommand("copy");
            }
            alert("コピーしました。チャットワークやメモに貼り付けてください。");
          } catch (error) {
            copyArea.focus();
            copyArea.select();
            document.execCommand("copy");
            alert("コピーしました。チャットワークやメモに貼り付けてください。");
          }
        });
      }

      if (openChatworkBtn) {
        openChatworkBtn.addEventListener("click", function () {
          window.open(CHATWORK_URL, "_blank", "noopener,noreferrer");
        });
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }
  </script>
</body>
</html>
