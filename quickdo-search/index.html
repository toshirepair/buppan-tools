<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>クイックドゥ相場リサーチツール</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --line: #d8dee9;
      --text: #18212f;
      --muted: #667085;
      --primary: #1f3b73;
      --primary-hover: #162d57;
      --secondary: #5b6472;
      --secondary-hover: #444c57;
      --link: #1f3b73;
      --shadow: 0 10px 30px rgba(18, 28, 45, 0.08);
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 16px 40px;
      line-height: 1.65;
      background:
        radial-gradient(circle at top left, rgba(31, 59, 115, 0.06), transparent 28%),
        linear-gradient(180deg, #f8fafc 0%, var(--bg) 100%);
      color: var(--text);
    }

    h1 {
      font-size: 1.65rem;
      margin: 0 0 6px;
      letter-spacing: 0.02em;
      color: var(--primary);
    }

    .subtitle {
      font-size: 0.92rem;
      color: var(--muted);
      margin-bottom: 18px;
    }

    .card {
      border: 1px solid rgba(216, 222, 233, 0.9);
      border-radius: var(--radius);
      padding: 18px;
      margin-top: 14px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--shadow);
      backdrop-filter: blur(4px);
    }

    .section-title {
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--text);
    }

    label {
      display: inline-block;
      margin-right: 12px;
      margin-bottom: 6px;
      color: var(--text);
    }

    input[type="text"],
    select,
    textarea {
      width: 100%;
      padding: 10px 12px;
      font-size: 1rem;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    input[type="text"]:focus,
    select:focus,
    textarea:focus {
      border-color: rgba(31, 59, 115, 0.5);
      box-shadow: 0 0 0 4px rgba(31, 59, 115, 0.08);
    }

    button {
      padding: 11px 18px;
      font-size: 0.98rem;
      font-weight: 700;
      cursor: pointer;
      border-radius: 10px;
      border: none;
      background: var(--primary);
      color: #fff;
      margin-top: 14px;
      transition: transform 0.14s ease, opacity 0.14s ease, background 0.14s ease;
      box-shadow: 0 8px 20px rgba(31, 59, 115, 0.18);
    }

    button:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .btn-gray {
      background: var(--secondary);
      box-shadow: 0 8px 20px rgba(91, 100, 114, 0.16);
    }

    .btn-gray:hover {
      background: var(--secondary-hover);
    }

    .small {
      font-size: 0.88rem;
      color: var(--muted);
    }

    .option-row {
      margin-top: 14px;
      padding-top: 2px;
    }

    .inline-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      margin-top: 8px;
    }

    .inline-group label {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 999px;
      padding: 7px 12px;
      margin-right: 0;
      margin-bottom: 0;
      font-size: 0.95rem;
    }

    .note {
      margin-top: 8px;
      font-size: 0.84rem;
      color: var(--muted);
    }

    .result-header {
      font-weight: 700;
      color: var(--text);
      font-size: 1rem;
      margin-bottom: 8px;
    }

    ul.result-list {
      list-style: none;
      padding-left: 0;
      margin: 0;
      margin-top: 10px;
    }

    ul.result-list li {
      margin-bottom: 10px;
      border: 1px solid #e7ebf2;
      border-radius: 12px;
      background: linear-gradient(180deg, #ffffff 0%, #fbfcfe 100%);
      transition: transform 0.14s ease, box-shadow 0.14s ease, border-color 0.14s ease;
    }

    ul.result-list li:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(18, 28, 45, 0.06);
      border-color: #d7deea;
    }

    a.result-link {
      display: block;
      padding: 14px 16px;
      font-size: 1rem;
      text-decoration: none;
      color: var(--link);
      word-break: break-word;
    }

    a.result-link strong {
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    textarea.copy-area {
      min-height: 210px;
      font-size: 0.92rem;
      margin-top: 10px;
      white-space: pre-wrap;
      resize: vertical;
      background: #fcfdff;
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    @media (max-width: 600px) {
      body {
        padding: 16px 12px 28px;
      }

      h1 {
        font-size: 1.4rem;
      }

      .card {
        padding: 15px;
      }

      .button-row {
        flex-direction: column;
      }

      .button-row button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <h1>クイックドゥ相場リサーチツール</h1>
  <div class="subtitle">クイックドゥ相場と個人相場を、素早く比較するための検索リンク生成ツールです。</div>

  <div class="card">
    <div>
      <label for="keyword" class="section-title">型番（ベースキーワード）</label>
      <input type="text" id="keyword" placeholder="例：Nikon D750">
    </div>

    <div class="option-row">
      <div class="section-title">並び順（落札相場）</div>
      <div class="inline-group">
        <label><input type="radio" name="sortOrder" value="low" checked> 落札価格の安い順</label>
        <label><input type="radio" name="sortOrder" value="high"> 落札価格の高い順</label>
      </div>
    </div>

    <div class="option-row">
      <div class="section-title">状態</div>
      <div class="inline-group">
        <label><input type="radio" name="condition" value="" checked> 指定なし</label>
        <label><input type="radio" name="condition" value="動作確認済み"> 動作確認済み</label>
        <label><input type="radio" name="condition" value="未確認"> 未確認</label>
        <label><input type="radio" name="condition" value="訳あり"> 訳あり</label>
        <label><input type="radio" name="condition" value="現状"> 現状</label>
        <label><input type="radio" name="condition" value="ジャンク"> ジャンク</label>
      </div>
      <div class="note">※ 「指定なし」の場合は追加キーワードなしで、型番のみで検索します。</div>
    </div>

    <button id="runBtn">検索開始</button>
  </div>

  <div id="result" class="card" style="display:none; margin-top:16px;">
    <div class="result-header">リンク一覧（スマホ／PC共通）</div>
    <div id="resultLinks" class="small" style="margin-top:8px;"></div>
  </div>

  <script>
    const CHATWORK_URL = "https://www.chatwork.com/#!rid417619944";

    document.getElementById("runBtn").addEventListener("click", function () {
      const baseWord = document.getElementById("keyword").value.trim();

      if (!baseWord) {
        alert("型番を入力してください。");
        document.getElementById("keyword").focus();
        return;
      }

      const selectedSort = document.querySelector('input[name="sortOrder"]:checked')?.value || "low";
      const selectedCondition = document.querySelector('input[name="condition"]:checked')?.value || "";
      const keyword = buildKeyword(baseWord, selectedCondition);

      const closedSortSelect = selectedSort === "low" ? "1" : "2";
      const sortLabel = selectedSort === "low" ? "落札価格の安い順" : "落札価格の高い順";

      const links = [
        {
          label: `ヤフオク落札相場（ストア／大阪）【${sortLabel}】`,
          url: buildClosedStoreOsakaUrl(keyword, closedSortSelect)
        },
        {
          label: `ヤフオク落札相場（個人／全国）【${sortLabel}】`,
          url: buildClosedPrivateUrl(keyword, closedSortSelect)
        },
        {
          label: "ヤフオク開催中（全て）【入札件数の多い順】",
          url: buildActiveBidCountDescUrl(keyword)
        },
        {
          label: "ヤフオク開催中（全て）【現在価格の安い順（送料込み）】",
          url: buildActivePriceAscUrl(keyword)
        }
      ];

      renderLinks({
        keyword,
        condition: selectedCondition || "指定なし",
        sortLabel,
        links
      });
    });

    function buildKeyword(baseWord, condition) {
      const parts = [baseWord.trim()];
      if (condition && condition.trim()) {
        parts.push(condition.trim());
      }
      return parts.join(" ");
    }

    function buildClosedStoreOsakaUrl(keyword, selectValue) {
      const p = encodeURIComponent(keyword);
      return (
        "https://auctions.yahoo.co.jp/closedsearch/closedsearch" +
        "?p=" + p +
        "&fixed=0" +
        "&loc_cd=27" +
        "&b=1" +
        "&is_postage_mode=1" +
        "&n=50" +
        "&select=" + encodeURIComponent(selectValue) +
        "&mode=2" +
        "&dest_pref_code=11" +
        "&abatch=1"
      );
    }

    function buildClosedPrivateUrl(keyword, selectValue) {
      const p = encodeURIComponent(keyword);
      return (
        "https://auctions.yahoo.co.jp/closedsearch/closedsearch" +
        "?p=" + p +
        "&fixed=0" +
        "&b=1" +
        "&is_postage_mode=1" +
        "&n=50" +
        "&select=" + encodeURIComponent(selectValue) +
        "&mode=2" +
        "&dest_pref_code=11" +
        "&abatch=2"
      );
    }

    function buildActiveBidCountDescUrl(keyword) {
      const p = encodeURIComponent(keyword);
      return (
        "https://auctions.yahoo.co.jp/search/search" +
        "?p=" + p +
        "&va=" + p +
        "&b=1" +
        "&n=50" +
        "&isdr=0" +
        "&exflg=1" +
        "&s1=bids" +
        "&o1=a"
      );
    }

    function buildActivePriceAscUrl(keyword) {
      const p = encodeURIComponent(keyword);
      return (
        "https://auctions.yahoo.co.jp/search/search" +
        "?p=" + p +
        "&va=" + p +
        "&b=1" +
        "&n=50" +
        "&isdr=0" +
        "&exflg=1" +
        "&s1=cbids" +
        "&o1=a"
      );
    }

    function renderLinks(data) {
      const resultDiv = document.getElementById("result");
      const resultLinks = document.getElementById("resultLinks");

      if (!data.links || data.links.length === 0) {
        resultDiv.style.display = "none";
        resultLinks.innerHTML = "";
        return;
      }

      let html = '<ul class="result-list">';
      data.links.forEach(link => {
        html += `
          <li>
            <a class="result-link" href="${escapeHtml(link.url)}" target="_blank" rel="noopener noreferrer">
              <strong>${escapeHtml(link.label)}</strong>
            </a>
          </li>
        `;
      });
      html += "</ul>";

      let copyText = "";
      copyText += `■検索キーワード：${data.keyword}\n`;
      copyText += `■状態：${data.condition}\n`;
      copyText += `■落札相場の並び順：${data.sortLabel}\n\n`;

      data.links.forEach(link => {
        copyText += `${link.label}\n${link.url}\n\n`;
      });

      html += `
        <div class="button-row">
          <button type="button" id="copyBtn">この結果をコピー</button>
          <button type="button" id="openChatworkBtn" class="btn-gray">チャットワークを開く</button>
        </div>
        <textarea class="copy-area" id="copyArea" readonly>${escapeTextarea(copyText)}</textarea>
      `;

      resultLinks.innerHTML = html;
      resultDiv.style.display = "block";

      const copyBtn = document.getElementById("copyBtn");
      const copyArea = document.getElementById("copyArea");
      const openChatworkBtn = document.getElementById("openChatworkBtn");

      if (copyBtn && copyArea) {
        copyBtn.addEventListener("click", async function () {
          const text = copyArea.value;

          try {
            if (navigator.clipboard && navigator.clipboard.writeText) {
              await navigator.clipboard.writeText(text);
            } else {
              copyArea.focus();
              copyArea.select();
              document.execCommand("copy");
            }
            alert("コピーしました。チャットワークやメモに貼り付けてください。");
          } catch (error) {
            copyArea.focus();
            copyArea.select();
            document.execCommand("copy");
            alert("コピーしました。チャットワークやメモに貼り付けてください。");
          }
        });
      }

      if (openChatworkBtn) {
        openChatworkBtn.addEventListener("click", function () {
          window.open(CHATWORK_URL, "_blank", "noopener,noreferrer");
        });
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeTextarea(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }
  </script>
</body>
</html>
